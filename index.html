<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ToDoList</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<!-- Body starts -->
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 text-center">My Task List</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="input-group mb-4">

                            <!-- Input to add each tasks -->
                            <input type="text" id="taskInput" class="form-control" placeholder="Enter task"
                                aria-label="Enter task">
                            
                            <!-- Button for add each task -->
                            <button class="btn btn-primary" type="button" id="addTaskBtn">
                                Add Task
                            </button>
                        </div>

                        <!-- List item to add each task -->
                        <ul id="taskList" class="list-group">
                        </ul>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Link external JavaScript -->
    <script src="js/scripts.js"></script>

</body>
<!-- Body ends -->

</html>
